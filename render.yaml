# Phase 1: Auth Service Only
# Uncomment other services as you're ready to deploy them

services:
  # Auth Service - Deploy First
  - type: web
    name: retail-auth-service
    env: go
    buildCommand: cd backend && go build -o ../auth-app ./services/auth/cmd/server/...
    startCommand: ./auth-app
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: LOG_FORMAT
        value: json
      - key: AUTH_PORT
        value: 8080
      - key: JWT_ACCESS_TOKEN_TTL
        value: 15m
      - key: JWT_REFRESH_TOKEN_TTL
        value: 168h
      - key: BCRYPT_COST
        value: 12
      # Set these in Render dashboard:
      # - DATABASE_URL (Auth DB - Neon Postgres)
      # - JWT_SECRET (generate with: openssl rand -hex 32)
      # - BREVO_SEND_EMAIL_API_KEY (optional for email verification)
      # - EMAIL_FROM (optional - verified sender email)
      # - APP_BASE_URL (https://retail-auth-service.onrender.com)

