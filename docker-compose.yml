version: "3.9"

# ── Networks ──────────────────────────────────────────────────────────────────
# All services communicate on the same internal network.
# From inside Docker, services reference each other by container name.
# e.g. the Order service connects to Postgres at host "postgres", not "localhost"
networks:
  retail-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
# Named volumes persist data between docker-compose restarts.
# Without this, your database resets every time you run docker-compose down.
volumes:
  postgres_data:
  redis_data:

services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  # One Postgres container, three databases (one per service).
  # In production you'd have separate clusters — here we share for simplicity.
  postgres:
    image: postgres:16-alpine       # alpine = smaller image, same Postgres
    container_name: retail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retailsecret
      POSTGRES_DB: auth_db          # default database (auth service)
    ports:
      - "5432:5432"                 # exposed to host so you can use TablePlus/DBeaver
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # This script creates the other two databases on first startup
      - ./infra/docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - retail-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: retail-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - retail-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service ───────────────────────────────────────────────────────────
  auth:
    build:
      context: .
      dockerfile: infra/docker/auth.Dockerfile
    container_name: retail-auth
    restart: unless-stopped
    env_file: ./services/auth/.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy  # wait for Postgres to be ready before starting
    networks:
      - retail-net

  # ── Order Service ──────────────────────────────────────────────────────────
  order:
    build:
      context: .
      dockerfile: infra/docker/order.Dockerfile
    container_name: retail-order
    restart: unless-stopped
    env_file: ./services/order/.env
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - retail-net

  # ── Inventory Service ──────────────────────────────────────────────────────
  inventory:
    build:
      context: .
      dockerfile: infra/docker/inventory.Dockerfile
    container_name: retail-inventory
    restart: unless-stopped
    env_file: ./services/inventory/.env
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - retail-net

  # ── Notification Service ───────────────────────────────────────────────────
  notification:
    build:
      context: .
      dockerfile: infra/docker/notification.Dockerfile
    container_name: retail-notification
    restart: unless-stopped
    env_file: ./services/notification/.env
    ports:
      - "8083:8083"
    networks:
      - retail-net