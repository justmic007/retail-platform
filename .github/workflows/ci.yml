# .github/workflows/ci.yml
# Runs on every push to any branch and every pull request to main.
# If any step fails, the whole pipeline fails — no broken code merges.

name: CI

on:
  push:
    branches: [main]        # all branches
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true           # cache Go modules between runs — faster CI

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    # Start Postgres and Redis as service containers
    # These are available to our tests at localhost:5432 and localhost:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retail
          POSTGRES_PASSWORD: retailsecret
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Create test databases
        run: |
          PGPASSWORD=retailsecret psql -h localhost -U retail -d auth_db -c "CREATE DATABASE order_db;"
          PGPASSWORD=retailsecret psql -h localhost -U retail -d auth_db -c "CREATE DATABASE inventory_db;"

      - name: Run tests with race detector
        # -race: detects race conditions in concurrent code
        # -count=1: disable test caching (always run fresh)
        # -timeout 120s: fail if tests take longer than 2 minutes
        run: go test -race -count=1 -timeout 120s ./...
        env:
          DATABASE_URL: postgres://retail:retailsecret@localhost:5432/auth_db?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci-only

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]     # only build if lint AND test pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build all services
        run: |
          cd services/auth && go build ./cmd/server/...
          cd ../../services/order && go build ./cmd/server/...
          cd ../../services/inventory && go build ./cmd/server/...
          cd ../../services/notification && go build ./cmd/server/...
        # CGO_ENABLED=0: builds a static binary with no C dependencies
        # This is required for distroless Docker images
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64