# .github/workflows/ci.yml
# Runs on every push to any branch and every pull request to main.
# If any step fails, the whole pipeline fails — no broken code merges.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retail
          POSTGRES_PASSWORD: retailsecret
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Create test databases
        run: |
          PGPASSWORD=retailsecret psql -h localhost -U retail -d auth_db -c "CREATE DATABASE order_db;"
          PGPASSWORD=retailsecret psql -h localhost -U retail -d auth_db -c "CREATE DATABASE inventory_db;"

      - name: Run tests — pkg module
        run: cd pkg && go test -race -count=1 -timeout 120s ./...
        env:
          JWT_SECRET: test-secret-for-ci-only

      - name: Run tests — auth service
        run: cd services/auth && go test -race -count=1 -timeout 120s ./...
        env:
          DATABASE_URL: postgres://retail:retailsecret@localhost:5432/auth_db?sslmode=disable
          JWT_SECRET: test-secret-for-ci-only

      - name: Run tests — order service
        run: cd services/order && go test -race -count=1 -timeout 120s ./...
        env:
          DATABASE_URL: postgres://retail:retailsecret@localhost:5432/order_db?sslmode=disable
          JWT_SECRET: test-secret-for-ci-only

      - name: Run tests — inventory service
        run: cd services/inventory && go test -race -count=1 -timeout 120s ./...
        env:
          DATABASE_URL: postgres://retail:retailsecret@localhost:5432/inventory_db?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci-only

      - name: Run tests — notification service
        run: cd services/notification && go test -race -count=1 -timeout 120s ./...
        env:
          JWT_SECRET: test-secret-for-ci-only

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build all services
        run: |
          cd services/auth && go build ./cmd/server/...
          cd ../../services/order && go build ./cmd/server/...
          cd ../../services/inventory && go build ./cmd/server/...
          cd ../../services/notification && go build ./cmd/server/...
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64